<svg width="180" height="220" viewBox="0 0 180 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Drop shadow -->
  <filter id="shadow">
    <feDropShadow dx="3" dy="5" stdDeviation="4" flood-color="rgba(0,0,0,0.18)"/>
  </filter>

  <g filter="url(#shadow)">
    <!-- Pot base -->
    <path d="M55 180 Q57 195 75 200 Q90 204 105 200 Q123 195 125 180 Z" fill="#E07B54" stroke="#1A1824" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Pot rim -->
    <rect x="48" y="172" width="84" height="14" rx="7" fill="#C96840" stroke="#1A1824" stroke-width="2.5"/>
    <!-- Pot shadow line -->
    <path d="M60 185 Q90 190 120 185" stroke="#A0522D" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Soil -->
    <ellipse cx="90" cy="174" rx="36" ry="5" fill="#6B4226" stroke="#1A1824" stroke-width="1.5"/>

    <!-- Main stem -->
    <path d="M90 172 C88 155 82 135 75 115 C70 100 68 85 72 70" stroke="#2D6A2D" stroke-width="4" stroke-linecap="round" fill="none"/>

    <!-- Climbing vine tendrils -->
    <!-- Right tendril up -->
    <path d="M82 145 C95 138 108 130 112 118 C116 108 113 95 106 90" stroke="#2D6A2D" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Left tendril -->
    <path d="M78 128 C65 122 58 110 60 96 C62 84 70 76 76 68" stroke="#2D6A2D" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Small curly tendrils -->
    <path d="M85 155 C92 150 98 155 95 162 C92 169 85 165 88 158" stroke="#3A8A3A" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M96 120 C103 115 110 120 107 128 C104 136 96 132 100 124" stroke="#3A8A3A" stroke-width="2" stroke-linecap="round" fill="none"/>

    <!-- Leaves on main stem -->
    <!-- Big leaf left at bottom -->
    <path d="M80 158 C60 148 50 130 55 115 C60 102 75 105 80 120 C83 132 82 148 80 158Z" fill="#4CAF50" stroke="#1A1824" stroke-width="2" stroke-linecap="round"/>
    <path d="M80 158 C72 135 65 118 60 110" stroke="#2D6A2D" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- Big leaf right mid -->
    <path d="M88 140 C108 132 118 112 112 98 C107 86 93 90 90 105 C87 118 87 132 88 140Z" fill="#66BB6A" stroke="#1A1824" stroke-width="2" stroke-linecap="round"/>
    <path d="M88 140 C98 118 108 100 112 95" stroke="#2D6A2D" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- Leaf left upper -->
    <path d="M76 110 C56 102 48 84 54 70 C60 58 74 62 76 78 C77 90 77 102 76 110Z" fill="#81C784" stroke="#1A1824" stroke-width="2" stroke-linecap="round"/>
    <path d="M76 110 C68 88 60 72 56 66" stroke="#2D6A2D" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- Small leaf right upper -->
    <path d="M88 100 C102 88 112 72 106 60 C100 50 90 56 88 70 C86 80 86 92 88 100Z" fill="#A5D6A7" stroke="#1A1824" stroke-width="2" stroke-linecap="round"/>
    <path d="M88 100 C96 80 103 66 106 58" stroke="#2D6A2D" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- Top small leaves -->
    <path d="M72 70 C60 58 58 42 66 34 C72 28 80 34 78 48 C76 58 74 66 72 70Z" fill="#C8E6C9" stroke="#1A1824" stroke-width="2" stroke-linecap="round"/>
    <path d="M72 70 C66 54 64 38 66 32" stroke="#2D6A2D" stroke-width="1.2" stroke-linecap="round" fill="none"/>

    <!-- Tiny heart leaf at top -->
    <path d="M78 48 C80 38 90 30 96 38 C100 44 96 52 90 56 C85 60 80 58 78 48Z" fill="#FFCDD2" stroke="#1A1824" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M78 48 C84 42 92 36 96 38" stroke="#C62828" stroke-width="1" stroke-linecap="round" fill="none"/>

    <!-- Little dot berries -->
    <circle cx="68" cy="90" r="4" fill="#FF8A65" stroke="#1A1824" stroke-width="1.5"/>
    <circle cx="100" cy="110" r="3.5" fill="#FF8A65" stroke="#1A1824" stroke-width="1.5"/>
    <circle cx="86" cy="130" r="3" fill="#FFCC02" stroke="#1A1824" stroke-width="1.5"/>

    <!-- Sparkle / doodle star near top -->
    <path d="M115 55 L117 50 L119 55 L124 57 L119 59 L117 64 L115 59 L110 57 Z" fill="#FFD60A" stroke="#1A1824" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- Small dots decoration -->
    <circle cx="50" cy="150" r="2.5" fill="#A5D6A7" stroke="#1A1824" stroke-width="1"/>
    <circle cx="125" cy="140" r="2" fill="#A5D6A7" stroke="#1A1824" stroke-width="1"/>
    <circle cx="130" cy="80" r="2" fill="#FFD60A" stroke="#1A1824" stroke-width="1"/>
  </g>
</svg>
